<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
</head>
<body>
<div class="container">
    <h1>QR Generator</h1>
    

    <input type="radio" id="url" name="type" value="url" class="tracker" checked>
    <input type="radio" id="wifi" name="type" value="wifi" class="tracker">
    <input type="radio" id="location" name="type" value="location" class="tracker">

    <div class="options-grid">
        <label for="url" class="option-label">URL</label>
        <label for="wifi" class="option-label">Wi-Fi</label>
        <label for="location" class="option-label">Location</label>
    </div>



    <form action="/generate" method="POST">
        <div id="url-section" class="form-section">
            <div class="input-group">
                <label for="url_input">Website Link</label>
                <input type="text" id="url_input" name="url_data" placeholder="https://example.com">
            </div>
        </div>

    
        <div id="wifi-section" class="form-section">
            <div class="input-group">
                <label for="wifi_ssid">Network Name (SSID)</label>
                <input type="text" id="wifi_ssid" name="wifi_ssid" placeholder="Home_Network">
            </div>
            <div class="input-group">
                <label for="wifi_pass">Password</label>
                <input type="password" id="wifi_pass" name="wifi_pass">
            </div>
        </div>


        <div id="location-section" class="form-section">
            <div class="input-group">
                <label for="latitude">Latitude</label>
                <input type="text" id="latitude" name="latitude" placeholder="e.g., 37.7749">
            </div>
            <div class="input-group">
                <label for="longitude">Longitude</label>
                <input type="text" id="longitude" name="longitude" placeholder="e.g., -122.4194">
            </div>  
        </div>

        <button type="submit" class="submit-btn">Generate QR Code</button>
    </form>
</body>
</html>
